name: Bump Homebrew Formula

# 触发：本仓库 GitHub Release 被 publish（由 release.yml 在 tag 推送后创建）
# 备份：手动触发，可显式指定版本号（用于补救 / dry-run）
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to bump (e.g., 1.6.225). Empty = use the latest GitHub release tag.'
        required: false

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        # SECURITY: ${{ inputs.version }} / ${{ github.event.release.tag_name }} 必须经 env: 注入,
        # 不得直接拼进 run: 脚本——后者会让恶意输入（仅 collaborator 可触发，但仍是标准 antipattern）
        # 在 semver 校验前就被 shell 解释。GitHub 官方 hardening 文档强烈建议这种隔离。
        env:
          INPUT_VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_VERSION" ]]; then
            VER="$INPUT_VERSION"
          elif [[ "$EVENT_NAME" == "release" ]]; then
            VER="${RELEASE_TAG#v}"
          else
            echo "Cannot resolve version" >&2
            exit 1
          fi
          # 校验版本号严格 semver patch 格式（再次防御：确保所有后续步骤拿到的 VER 是干净的）
          if ! [[ "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VER" >&2
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VER"

      - name: Wait for npm registry to publish
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # CDN 传播最长 ~5min;每 30s 重试,共 10 次 = 5min
          for i in $(seq 1 10); do
            if curl -fsSL "https://registry.npmjs.org/@yuanyunfan%2fglasshouse/${VER}" >/dev/null 2>&1; then
              echo "✓ npm has @yuanyunfan/glasshouse@${VER}"
              exit 0
            fi
            echo "[$i/10] npm not yet showing @yuanyunfan/glasshouse@${VER}, sleeping 30s..."
            sleep 30
          done
          echo "✗ Timed out waiting for npm to publish @yuanyunfan/glasshouse@${VER}" >&2
          exit 1

      - name: Compute tarball sha256
        id: hash
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          URL="https://registry.npmjs.org/@yuanyunfan/glasshouse/-/glasshouse-${VER}.tgz"
          curl -fsSL "$URL" -o /tmp/pkg.tgz
          SHA=$(sha256sum /tmp/pkg.tgz | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "✓ sha256=$SHA"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: yuanyunfan/homebrew-glasshouse
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        env:
          URL: ${{ steps.hash.outputs.url }}
          SHA: ${{ steps.hash.outputs.sha256 }}
        run: |
          set -euo pipefail
          FORMULA=tap/Formula/glasshouse.rb
          if [[ ! -f "$FORMULA" ]]; then
            echo "$FORMULA not found in tap repo" >&2
            exit 1
          fi
          # 仅替换 url 与 sha256 行；其它内容（depends_on / install / test 块）由维护者管理。
          # python 通过 sys.argv 拿 env 注入的 URL/SHA，不让 Action 表达式直接拼进 shell 行。
          python3 - "$FORMULA" "$URL" "$SHA" <<'PY'
          import re, sys
          path, url, sha = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(path, 'r', encoding='utf-8') as f:
              src = f.read()
          src = re.sub(r'url\s+"[^"]+"', f'url "{url}"', src, count=1)
          src = re.sub(r'sha256\s+"[^"]+"', f'sha256 "{sha}"', src, count=1)
          with open(path, 'w', encoding='utf-8') as f:
              f.write(src)
          PY
          echo "--- Updated formula ---"
          grep -E '(url|sha256) ' "$FORMULA"

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          path: tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          commit-message: "glasshouse ${{ steps.ver.outputs.version }}"
          title: "glasshouse ${{ steps.ver.outputs.version }}"
          body: |
            Automated bump from [Glasshouse release `v${{ steps.ver.outputs.version }}`](https://github.com/yuanyunfan/glasshouse/releases/tag/v${{ steps.ver.outputs.version }}).

            - npm tarball: <${{ steps.hash.outputs.url }}>
            - sha256: `${{ steps.hash.outputs.sha256 }}`

            Generated by `.github/workflows/bump-homebrew.yml` in `yuanyunfan/glasshouse`.
          branch: bump-${{ steps.ver.outputs.version }}
          delete-branch: true
