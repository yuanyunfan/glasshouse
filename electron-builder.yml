appId: com.glasshouse.app
productName: Glasshouse
copyright: Copyright © 2026

directories:
  output: electron-dist

files:
  - dist/**/*
  - server.js
  - cli.js
  - proxy.js
  - interceptor.js
  - i18n.js
  - findcc.js
  - pty-manager.js
  - scratch-pty-manager.js
  - workspace-registry.js
  - lib/**/*
  - plugins/**/*
  - concepts/**/*
  - electron/**/*
  - package.json
  - "!node_modules/**/*.md"
  - "!node_modules/**/*.ts"
  - "!node_modules/**/test/**"
  - "!node_modules/**/tests/**"
  - "!node_modules/**/.github/**"

extraMetadata:
  main: electron/main.js

afterSign: build/notarize.js

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # 签名配置 - 使用环境变量
  # CSC_LINK: 指向 .p12 证书文件的路径
  # CSC_KEY_PASSWORD: .p12 证书的密码
  # APPLE_ID: 你的 Apple ID 邮箱
  # APPLE_APP_SPECIFIC_PASSWORD: App-specific 密码
  # APPLE_TEAM_ID: 你的 Team ID

win:
  target:
    - nsis
  icon: build/icon.png

linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

asar: false

npmRebuild: true
buildDependenciesFromSource: false
